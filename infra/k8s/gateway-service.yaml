apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: djembe/gateway-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: CORE_SERVICE_URL
          value: "http://core-service:80"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: LoadBalancer
  selector:
    app: gateway-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
