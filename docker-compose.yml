services:
  db:
    image: postgres:15
    container_name: djembe-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: davou64598258
      POSTGRES_DB: djembe_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db:/docker-entrypoint-initdb.d

  zookeeper:
    image: zookeeper:3.9.2
    container_name: djembe-zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: djembe-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  redis:
    image: redis:7.2.4
    container_name: djembe-redis
    ports:
      - "6379:6379"

  api:
    build: ./backend/core-service
    container_name: djembe-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:davou64598258@db:5432/djembe_bank
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUTF8=1
    depends_on:
      - db
      - redis
      - kafka

volumes:
  postgres_data:
