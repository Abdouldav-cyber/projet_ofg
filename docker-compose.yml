services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  db:
    image: postgres:15
    container_name: djembe-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: davou64598258
      POSTGRES_DB: djembe_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d djembe_bank"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4
    container_name: djembe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: zookeeper:3.9.2
    container_name: djembe-zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: djembe-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # ============================================
  # BACKEND SERVICES
  # ============================================

  api:
    build: ./backend/core-service
    container_name: djembe-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:davou64598258@db:5432/djembe_bank
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=super-secret-key-djembe-bank-2025
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - PYTHONUTF8=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  websocket:
    build: ./backend/websocket-service
    container_name: djembe-websocket
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super-secret-key-djembe-bank-2025
      - WS_PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # FRONTEND
  # ============================================

  frontend-admin:
    build:
      context: ./frontend-admin
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8080
    container_name: djembe-frontend-admin
    ports:
      - "3000:80"
    depends_on:
      - api
      - websocket
    restart: unless-stopped

volumes:
  postgres_data:
